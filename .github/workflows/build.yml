name: Build Plugin
on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install --legacy-peer-deps
      - run: |
          npx esbuild plugins/LarpEngine/src/index.ts \
            --bundle --minify --format=esm --outfile=index.js \
            --external:@vendetta/* --external:@vendetta --external:react --external:react-native
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages