name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      # On ajoute --legacy-peer-deps pour ignorer les erreurs de version
      - run: npm install --legacy-peer-deps
      - run: npx esbuild src/index.ts --bundle --minify --format=esm --outfile=index.js --external:vendetta --external:react
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .